[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv

; Use shared protocol header
build_flags =
    -I../shared
    -DBOARD_HAS_PSRAM

; Upload filesystem (LittleFS)
board_build.filesystem = littlefs

lib_ldf_mode = deep+

; Upload settings - ensure DTR/RTS don't hold ESP32 in boot mode
; esptool handles the reset sequence: DTR=low+RTS=low -> RTS=high (GPIO0 boot) -> DTR=high (run)
upload_speed = 460800
monitor_rts = 0
monitor_dtr = 0
