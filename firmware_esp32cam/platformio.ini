[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv

; Use shared protocol header
build_flags =
    -I../shared
    -DBOARD_HAS_PSRAM

; Upload filesystem (LittleFS)
board_build.filesystem = littlefs

lib_deps =
    ESP Async WebServer
    AsyncTCP
