<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="manifest" href="manifest.json">
    <title>Car DIY Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Video Stream -->
        <div id="video-container">
            <img id="video-stream" alt="Camera Stream">
            <div id="status-overlay">
                <span id="connection-status">Connecting...</span>
                <span id="rpm-display">L: 0 | R: 0</span>
                <a href="/admin" id="admin-link">Admin</a>
            </div>
        </div>

        <!-- Control Mode Tabs -->
        <div id="control-tabs">
            <button class="tab active" data-mode="drive">Drive</button>
            <button class="tab" data-mode="tank">Tank</button>
        </div>

        <!-- Drive Mode: Throttle (left) | Brake (center-left) | Steering (right) -->
        <div id="drive-mode" class="control-mode active">
            <!-- Left: Throttle -->
            <div class="drive-col">
                <span class="drive-label">Throttle</span>
                <div class="throttle-track" id="throttle-track">
                    <div class="throttle-fill" id="throttle-fill"></div>
                    <div class="throttle-thumb" id="throttle-thumb"></div>
                    <div class="throttle-zero"></div>
                </div>
                <span id="throttle-value" class="drive-val mono">0</span>
            </div>

            <!-- Brake next to throttle -->
            <div class="drive-col brake-col">
                <button id="brake-btn">B<br>R<br>A<br>K<br>E</button>
            </div>

            <!-- Spacer -->
            <div class="drive-spacer"></div>

            <!-- Right: Steering -->
            <div class="drive-col steer-col">
                <span class="drive-label">Steer</span>
                <div class="steering-track" id="steering-track">
                    <div class="steering-thumb" id="steering-thumb"></div>
                    <div class="steering-center"></div>
                </div>
                <span id="steering-value" class="drive-val mono">0</span>
            </div>
        </div>

        <!-- Tank Mode (dual sliders) -->
        <div id="tank-mode" class="control-mode">
            <div class="tank-controls">
                <div class="slider-group">
                    <label>Left</label>
                    <div class="vertical-slider-track" data-motor="left">
                        <div class="vertical-slider-fill" id="left-fill"></div>
                        <div class="vertical-slider-thumb" id="left-thumb"></div>
                    </div>
                    <span id="left-value">0</span>
                </div>
                <div class="slider-group">
                    <label>Right</label>
                    <div class="vertical-slider-track" data-motor="right">
                        <div class="vertical-slider-fill" id="right-fill"></div>
                        <div class="vertical-slider-thumb" id="right-thumb"></div>
                    </div>
                    <span id="right-value">0</span>
                </div>
            </div>
        </div>

        <!-- Emergency Stop (cuts all power, wheels free) -->
        <button id="stop-btn">EMERGENCY OFF</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
